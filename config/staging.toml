# =============================================================================
# Staging environment — non-sensitive configuration
# All secrets injected via secrets manager at deploy time.
# =============================================================================

[server]
host = "0.0.0.0"
port = 8000
cors_allowed_origins = ["https://staging.aframp.io"]

[database]
max_connections = 30
min_connections = 5
connection_timeout_secs = 30
idle_timeout_secs = 300
ssl_mode = "require"

[cache]
default_ttl_secs = 3600
max_connections = 15

[logging]
level = "INFO"
format = "json"
enable_tracing = true

[workers]
poll_interval_secs = 5
batch_size = 100
max_retries = 3
transaction_monitor_interval_secs = 10
payment_poller_interval_secs = 5
offramp_processor_interval_secs = 5

[rate_limiting]
requests_per_minute = 60
burst = 10

[stellar]
network = "testnet"
horizon_url = "https://horizon-testnet.stellar.org"
request_timeout_secs = 15
max_retries = 3
health_check_interval_secs = 30

[telemetry]
sampling_rate = 0.5
otlp_endpoint = "http://otel-collector:4317"
service_name = "aframp-backend-staging"

[features]
enable_mock_payments = false
enable_swagger_ui = true
enable_metrics = true
