# =============================================================================
# Production environment — non-sensitive configuration
# All secrets injected via secrets manager at deploy time.
# TLS terminated at load balancer (ALB / nginx). App listens on plain HTTP.
# =============================================================================

[server]
host = "0.0.0.0"
port = 8000
cors_allowed_origins = ["https://aframp.io", "https://app.aframp.io"]

[database]
max_connections = 50
min_connections = 10
connection_timeout_secs = 10
idle_timeout_secs = 300
ssl_mode = "verify-full"
# Read replica URL injected via DATABASE_READ_REPLICA_URL secret

[cache]
default_ttl_secs = 3600
max_connections = 30
# Redis must use rediss:// (TLS) — enforced at startup validation

[logging]
level = "WARN"
format = "json"
enable_tracing = true

[workers]
poll_interval_secs = 5
batch_size = 100
max_retries = 3
transaction_monitor_interval_secs = 10
payment_poller_interval_secs = 5
offramp_processor_interval_secs = 5

[rate_limiting]
requests_per_minute = 60
burst = 10

[stellar]
network = "mainnet"
horizon_url = "https://horizon.stellar.org"
request_timeout_secs = 15
max_retries = 5
health_check_interval_secs = 30

[telemetry]
sampling_rate = 0.1
otlp_endpoint = "http://otel-collector:4317"
service_name = "aframp-backend"

[features]
enable_mock_payments = false
enable_swagger_ui = false
enable_metrics = true
