# =============================================================================
# Nginx — TLS termination for Aframp backend
# Enforces HTTPS-only, TLS 1.2+, HSTS, and secure headers.
# Certificate renewal handled by Certbot / ACM — see RUNBOOKS.md.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Hide nginx version
    server_tokens off;

    # Logging
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # Upstream — application container
    upstream aframp_backend {
        server app:8000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name aframp.io app.aframp.io;

        # TLS certificates (managed by Certbot / ACM)
        ssl_certificate     /etc/letsencrypt/live/aframp.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aframp.io/privkey.pem;

        # TLS protocol — minimum 1.2, prefer 1.3
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

        # Session resumption
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS — 1 year, include subdomains
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options           "DENY"            always;
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        add_header Referrer-Policy           "strict-origin"   always;
        add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;

        # Proxy to application
        location / {
            proxy_pass         http://aframp_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Health check endpoint — no auth required
        location /health {
            proxy_pass http://aframp_backend/health;
            access_log off;
        }
    }
}
