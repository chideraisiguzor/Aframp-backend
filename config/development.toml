# =============================================================================
# Development environment — non-sensitive configuration
# Secrets (DATABASE_URL, REDIS_URL, keys, etc.) come from .env, never here.
# =============================================================================

[server]
host = "127.0.0.1"
port = 8000
cors_allowed_origins = ["http://localhost:3000", "http://127.0.0.1:3000"]

[database]
max_connections = 10
min_connections = 2
connection_timeout_secs = 30
idle_timeout_secs = 600
ssl_mode = "disable"

[cache]
default_ttl_secs = 3600
max_connections = 5

[logging]
level = "DEBUG"
format = "plain"
enable_tracing = false

[workers]
poll_interval_secs = 5
batch_size = 50
max_retries = 3
transaction_monitor_interval_secs = 10
payment_poller_interval_secs = 5
offramp_processor_interval_secs = 5

[rate_limiting]
requests_per_minute = 120
burst = 20

[stellar]
network = "testnet"
horizon_url = "https://horizon-testnet.stellar.org"
request_timeout_secs = 15
max_retries = 3
health_check_interval_secs = 30

[telemetry]
sampling_rate = 1.0
otlp_endpoint = "http://localhost:4317"
service_name = "aframp-backend"

[features]
enable_mock_payments = true
enable_swagger_ui = true
enable_metrics = true
